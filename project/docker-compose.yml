version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: taskmanager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskmanager

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskmanager
      JWT_SECRET: change_this_to_a_strong_secret_min_32_chars
      JWT_REFRESH_SECRET: change_this_refresh_secret_min_32_chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
